apiVersion: apps/v1
kind: Deployment
metadata:
  name: deep-l
spec:
  replicas: 1 # Creates a single pod that is automatically restarted on crash
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: deep-l
  template:
    metadata:
      labels:
        app: deep-l
    spec:
      imagePullSecrets:
      - name: private-registry-auth


      containers:
      - name: deep-l
        image: registry.datexis.com/beds2153/dl-python:3.11.9 # Download your own Python image every time again from Docker Hub
                                             # Replace with your own image
        imagePullPolicy: Always

        securityContext:
          runAsUser: 0 # Run Docker image as user root
        ports:
          - containerPort: 22 
        resources:
          requests:
            cpu: "1" # minimum number of cpus you want
            memory: 5Gi
            nvidia.com/gpu: 1
          limits:
            cpu: "2" # maximum number of cpus you want
            memory: 10Gi # Shut down if it exceeds this RAM
            nvidia.com/gpu: 1 # Always set limit to gpus, otherwise you get allocated all the available ones
        volumeMounts:
          - name: deep-l-pvc
            mountPath: /storage # Mount the persistent volume claim to the container in the path /storage
          - name: ssh-key
            mountPath: /root/.ssh # Mount the secret with the SSH key to the container
          #- name: dshm
            #mountPath: /dev/shm # shared memory for multiprocessing
      
      nodeSelector:
        gpu: v100 # Check Grafana for the other types of GPUs available in our cluster
      volumes:
        - name: deep-l-pvc
          persistentVolumeClaim:
            claimName: deep-l-pvc
        - name: ssh-key
          secret:
            secretName: deep-l-secret
        #- name: dshm
          #emptyDir:
            #medium: Memory
            #sizeLimit: 2Gi